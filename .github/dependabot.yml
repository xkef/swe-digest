version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "uv"
    directory: "/tool"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]

  # tool/requirements.txt stays the install source for the minimal scheduled
  # jobs.
  - package-ecosystem: "pip"
    directory: "/tool"
    schedule:
      interval: "weekly"
