name: Digest feedback
description: Feedback on a published digest or story
title: "[feedback] "
labels: ["feedback"]
body:
  - type: input
    id: story
    attributes:
      label: Story
      description: Story title, or blank for digest-level feedback.
    validations:
      required: false
  - type: input
    id: date
    attributes:
      label: Digest date
      placeholder: "YYYY-MM-DD"
    validations:
      required: false
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - not interesting
        - wrong source
        - missed story
        - too many stories
        - format problem
        - more like this
        - other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
    validations:
      required: false
