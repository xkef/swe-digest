name: Story suggestion
description: Suggest a story for the daily digest
title: "[story] "
labels: ["story"]
body:
  - type: input
    id: url
    attributes:
      label: Source URL
      description: Primary source preferred. The routine verifies it like any other candidate.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: Optional. One or two sentences on engineering relevance.
    validations:
      required: false
