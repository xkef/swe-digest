name: failure-alert

# Opens (or updates) one ops issue per failing scheduled workflow, so an
# unattended failure surfaces in the issue list instead of rotting silently
# in the Actions tab. Issues are created as github-actions[bot], which the
# issue-guard workflow allowlists.
on:
  workflow_run:
    workflows:
      - Daily digest
      - Digest quality pass
      - Weekly improvement
      - snapshots
      - Deploy Pages
      - CI
    types: [completed]

permissions:
  issues: write

jobs:
  alert:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Open or update ops issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          title="ops: $WORKFLOW_NAME workflow failing"
          body="Run failed on \`$BRANCH\`: $RUN_URL"
          number=$(gh issue list --repo "$REPO" --state open \
            --search "in:title \"$title\"" --json number,title \
            --jq ".[] | select(.title == \"$title\") | .number" | head -1)
          if [ -n "$number" ]; then
            gh issue comment "$number" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "$title" --body "$body"
          fi
