name: failure-alert

# Opens (or updates) one ops issue per failing scheduled workflow, so an
# unattended failure surfaces in the issue list instead of rotting silently
# in the Actions tab. Issues are created as github-actions[bot], which the
# issue-guard workflow allowlists. One scan serves both triggers: a
# workflow_run failure event runs it immediately, and the schedule re-runs
# it because GitHub sometimes drops workflow_run completion events (observed
# 2026-07-03 for Deploy Pages failures). The URL check makes the scan
# idempotent, so overlapping triggers never double-report a run.
# A failed Deploy Pages run is additionally retried (see the retry step):
# its dominant failure mode is a transient Pages backend rejection that a
# later rerun of the same artifact absorbs.
on:
  workflow_run:
    # Timeliness only; the case list in the step below decides which
    # workflows alert. Keep the two lists in sync.
    workflows:
      - Daily digest
      - Digest quality pass
      - Weekly improvement
      - snapshots
      - Deploy Pages
      - CI
    types: [completed]
  schedule:
    - cron: "25 */6 * * *"

permissions:
  issues: write
  # write instead of read so the retry step can rerun failed Deploy Pages
  # runs; alerting itself only reads.
  actions: write

concurrency:
  group: failure-alert

jobs:
  alert:
    if: >-
      github.event_name == 'schedule' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Alert on unreported failed runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Lookback must exceed the 6-hour cron interval so no failed run
          # falls between sweeps.
          cutoff=$(date -u -d '7 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          gh run list --repo "$REPO" --status failure --created ">$cutoff" \
            --json name,url,headBranch,event \
            --jq '.[] | select(.event != "pull_request")
                  | [.name, .headBranch, .url] | @tsv' |
          while IFS=$'\t' read -r name branch url; do
            case "$name" in
              "Daily digest"|"Digest quality pass"|"Weekly improvement"|"snapshots"|"Deploy Pages"|"CI") ;;
              *) continue ;;
            esac
            title="ops: $name workflow failing"
            body="Run failed on \`$branch\`: $url"
            issues=$(gh issue list --repo "$REPO" --state all --limit 20 \
              --search "in:title \"$title\"" --json number,title,state \
              --jq "[.[] | select(.title == \"$title\")]")
            already_reported=false
            for number in $(jq -r '.[].number' <<<"$issues"); do
              if gh issue view "$number" --repo "$REPO" --json body,comments \
                --jq '.body, .comments[].body' | grep -qF "$url"; then
                already_reported=true
                break
              fi
            done
            if [ "$already_reported" = true ]; then
              continue
            fi
            open_number=$(jq -r 'map(select(.state == "OPEN"))
              | .[0].number // empty' <<<"$issues")
            if [ -n "$open_number" ]; then
              gh issue comment "$open_number" --repo "$REPO" --body "$body"
            else
              gh issue create --repo "$REPO" --title "$title" --body "$body"
            fi
          done
      - name: Retry a failed Deploy Pages run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
        run: |
          # Retry only the newest Deploy Pages run: rerunning an older one
          # would redeploy a stale artifact over a newer successful deploy.
          # An event-triggered scan retries once, right after the failure, to
          # absorb a short flake; scheduled sweeps keep retrying, spaced
          # hours apart, to ride out longer Pages incidents (2026-07-04: one
          # lasted over 80 minutes). The attempt cap stops a permanently
          # broken deploy from rerunning forever. Alerting above runs first,
          # so a failure is reported even when a retry later fixes it.
          if [ "$EVENT" = "schedule" ]; then
            max_attempt=5
          else
            max_attempt=2
          fi
          run=$(gh run list --repo "$REPO" --workflow "Deploy Pages" \
            --branch main --limit 1 --json databaseId,conclusion,attempt)
          id=$(jq -r '.[0].databaseId // empty' <<<"$run")
          conclusion=$(jq -r '.[0].conclusion' <<<"$run")
          attempt=$(jq -r '.[0].attempt' <<<"$run")
          if [ -n "$id" ] && [ "$conclusion" = "failure" ] &&
             [ "$attempt" -lt "$max_attempt" ]; then
            gh run rerun "$id" --failed --repo "$REPO" ||
              echo "rerun of $id failed; the next sweep retries"
          fi
