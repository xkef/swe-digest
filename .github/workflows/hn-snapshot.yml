name: hn-snapshot

# Timing root for every pipeline. This is the only schedule: it runs every
# three hours, pushes the data/hn/ snapshot, then dispatches the downstream
# workflows so they start on fresh data instead of guessing a cron offset.
# Daily digest at 06/12/18 UTC, weekly improvement on Sunday at 09 UTC.
on:
  schedule:
    - cron: "20 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: hn-snapshot

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Fetch HN
        run: python3 scripts/fetch_hn.py
      - name: Commit snapshot
        run: |
          day=$(date -u +%F)
          python3 scripts/merge_hn_snapshot.py ".cache/hn/$day.json" "data/hn/$day.json"
          ls data/hn/*.json | sort | head -n -7 | xargs -r git rm -q --
          git add "data/hn/$day.json"
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git config user.name "hn-snapshot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore: hn snapshot for $day"
          git pull --rebase origin main
          git push origin main
      - name: Dispatch downstream pipelines
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          hour=$(date -u +%H)
          dow=$(date -u +%u)
          case "$hour" in
            06|12|18)
              gh workflow run daily-digest.yml
              echo "dispatched daily digest (hour $hour UTC)" ;;
            09)
              if [ "$dow" = "7" ]; then
                gh workflow run weekly-improvement.yml
                echo "dispatched weekly improvement (Sunday $hour UTC)"
              else
                echo "hour $hour UTC, not Sunday: no dispatch"
              fi ;;
            *)
              echo "hour $hour UTC is not a pipeline slot" ;;
          esac
