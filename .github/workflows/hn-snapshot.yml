name: hn-snapshot

# Background accumulator. Runs every three hours and merges each fetch into
# the day's data/hn/ file by item id, so coverage builds up across the day and
# survives a digest run whose live HN fetch is degraded. It only collects; the
# digest and weekly workflows run on their own schedules and fetch HN live.
on:
  schedule:
    - cron: "20 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hn-snapshot

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Fetch HN
        run: python3 scripts/fetch_hn.py
      - name: Commit snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          day=$(date -u +%F)
          python3 scripts/merge_hn_snapshot.py ".cache/hn/$day.json" "data/hn/$day.json"
          ls data/hn/*.json | sort | head -n -7 | xargs -r git rm -q --
          git add "data/hn/$day.json"
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          staged=$(git diff --cached --name-only)
          if printf '%s\n' "$staged" | grep -qvE '^data/hn/[0-9]{4}-[0-9]{2}-[0-9]{2}\.json$'; then
            echo "refusing: staged paths outside data/hn/"; exit 1
          fi
          python3 scripts/commit_snapshot.py "chore: hn snapshot for $day"
