name: hn-snapshot

on:
  schedule:
    - cron: "20 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hn-snapshot

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Fetch HN
        run: python3 scripts/fetch_hn.py
      - name: Commit snapshot
        run: |
          day=$(date -u +%F)
          python3 scripts/merge_hn_snapshot.py ".cache/hn/$day.json" "data/hn/$day.json"
          ls data/hn/*.json | sort | head -n -7 | xargs -r git rm -q --
          git add "data/hn/$day.json"
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git config user.name "hn-snapshot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore: hn snapshot for $day"
          git pull --rebase origin main
          git push origin main
