name: books-snapshot

# Background accumulator. Runs every twelve hours and merges each fetch into the
# day's data/books/ file by item id, so coverage builds up across the day and
# survives a digest run whose live publisher-feed fetch is degraded. It only
# collects; the digest and weekly workflows run on their own schedules and
# fetch live.
on:
  schedule:
    - cron: "30 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: books-snapshot

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Fetch books
        run: python3 scripts/fetch_books.py
      - name: Commit snapshot
        run: |
          day=$(date -u +%F)
          python3 scripts/merge_books_snapshot.py ".cache/books/$day.json" "data/books/$day.json"
          ls data/books/*.json | sort | head -n -7 | xargs -r git rm -q --
          git add "data/books/$day.json"
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git config user.name "books-snapshot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore: books snapshot for $day"
          git pull --rebase origin main
          git push origin main
