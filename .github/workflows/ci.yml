name: CI

# Validates the Python package (lint, format, types, tests with the gate
# coverage floor), the full site build, and Markdown/TOML/JSON formatting on
# every PR and push to main. Snapshot data commits skip CI: they are
# bot-authored JSON validated by the snapshot pipeline itself.
on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "snapshots/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
      - name: Sync environment
        run: uv sync --frozen
        working-directory: tool
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
        working-directory: tool
      - name: Type check
        run: uv run mypy
        working-directory: tool
      - name: Tests
        run: uv run pytest
        working-directory: tool

  site:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
      - name: Install Python deps
        run: python3 -m pip install --require-hashes -r tool/requirements.txt
      - name: Build and check site
        run: make check

  # Formatting drift check for owner-edited files (routine, memory, README).
  # dprint and rumdl exclude site/content/ and snapshots/, and the tool versions are
  # pinned in the Makefile, so this job and `make fmt-check` locally always
  # agree. It reports drift; the publish gate (`make check`) stays
  # formatting-free so unattended runs are never blocked on it.
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
      - name: Check formatting
        run: make fmt-check
