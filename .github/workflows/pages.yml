name: Deploy Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "snapshots/**"
      - "memory/runs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # cache disabled: this pages:write / id-token:write job must not restore
      # a tool cache the untrusted agent job could have poisoned.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: false
      - name: Install python dependencies
        run: python3 -m pip install --require-hashes -r tool/requirements.txt
      - name: Validate content
        run: make check-content
      - name: Build
        run: make build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      # Pages intermittently rejects a deployment server-side with a generic
      # "try again later" while a rerun of the same artifact succeeds, so one
      # delayed retry absorbs the flake.
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
