name: Deploy Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/hn/**"
      - "data/youtube/**"
      - "data/papers/**"
      - "data/books/**"
      - "data/runs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # cache disabled: this pages:write / id-token:write job must not restore
      # a tool cache the untrusted agent job could have poisoned.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: false
      - name: Install python dependencies
        run: python3 -m pip install --require-hashes -r requirements.txt
      - name: Validate content
        run: make check-content
      - name: Build
        run: make build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
