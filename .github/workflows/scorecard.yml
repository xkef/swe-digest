name: Scorecard

# OpenSSF Scorecard supply-chain analysis. Publishes results so the README
# badge and the OpenSSF REST API reflect the current score.
on:
  schedule:
    - cron: "25 5 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: results.sarif
