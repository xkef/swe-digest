name: snapshots

# Background accumulators for every fetched source, one matrix job per source.
# Each run merges its fetch into the day's data/ file by item id, so coverage
# builds up across the day and survives a digest run whose live fetch is
# degraded. It only collects; the digest and weekly workflows run on their own
# schedules and fetch live.
#
# fail-fast is off: one source failing (or being blocked) never stops the
# others. Cadence per source is kept by matching the firing cron against the
# matrix entry; workflow_dispatch runs every source.
on:
  schedule:
    - cron: "20 */3 * * *" # hn
    - cron: "40 */6 * * *" # youtube
    - cron: "50 */6 * * *" # papers
    - cron: "30 */12 * * *" # books
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: hn
            kind: hn
            dir: data/hn
            cron: "20 */3 * * *"
          - source: youtube
            kind: yt
            dir: data/youtube
            cron: "40 */6 * * *"
          - source: papers
            kind: papers
            dir: data/papers
            cron: "50 */6 * * *"
          - source: books
            kind: books
            dir: data/books
            cron: "30 */12 * * *"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: snapshot-${{ matrix.source }}
    env:
      DUE: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == matrix.cron }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: env.DUE == 'true'
        with:
          persist-credentials: false
      - name: Fetch ${{ matrix.source }}
        if: env.DUE == 'true'
        run: PYTHONPATH=src python3 -m swe_digest fetch ${{ matrix.source }}
      - name: Merge and commit snapshot
        if: env.DUE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          day=$(date -u +%F)
          PYTHONPATH=src python3 -m swe_digest merge ${{ matrix.kind }} ".cache/${{ matrix.kind }}/$day.json" "${{ matrix.dir }}/$day.json"
          ls ${{ matrix.dir }}/*.json | sort | head -n -7 | xargs -r git rm -q --
          git add "${{ matrix.dir }}/$day.json"
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          staged=$(git diff --cached --name-only)
          if printf '%s\n' "$staged" | grep -qvE '^${{ matrix.dir }}/[0-9]{4}-[0-9]{2}-[0-9]{2}\.json$'; then
            echo "refusing: staged paths outside ${{ matrix.dir }}/"; exit 1
          fi
          PYTHONPATH=src python3 -m swe_digest commit-snapshot "chore: ${{ matrix.kind }} snapshot for $day"
