name: snapshots

# Background accumulator for every fetched source, one job with a step per
# source. Each run merges its fetch into the day's data/ file by item id, so
# coverage builds up across the day and survives a digest run whose live
# fetch is degraded. It only collects; the digest and weekly workflows run on
# their own schedules and fetch live.
#
# Fetch steps are continue-on-error: one source failing (or being blocked)
# never stops the others, and the final step fails the run afterwards so
# failure-alert still fires. Cadence per source is kept by matching the
# firing cron in each step's condition; workflow_dispatch runs every source.
on:
  schedule:
    - cron: "20 */3 * * *" # hn
    - cron: "40 */6 * * *" # youtube
    - cron: "50 */6 * * *" # papers
    - cron: "30 */12 * * *" # books
  workflow_dispatch:

permissions: {}

concurrency:
  group: snapshots

jobs:
  snapshot:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Fetch hn
        id: fetch-hn
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '20 */3 * * *'
        continue-on-error: true
        timeout-minutes: 5
        run: PYTHONPATH=src python3 -m swe_digest fetch hn
      - name: Fetch youtube
        id: fetch-youtube
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '40 */6 * * *'
        continue-on-error: true
        timeout-minutes: 5
        run: PYTHONPATH=src python3 -m swe_digest fetch youtube
      - name: Fetch papers
        id: fetch-papers
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '50 */6 * * *'
        continue-on-error: true
        timeout-minutes: 5
        run: PYTHONPATH=src python3 -m swe_digest fetch papers
      - name: Fetch books
        id: fetch-books
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 */12 * * *'
        continue-on-error: true
        timeout-minutes: 5
        run: PYTHONPATH=src python3 -m swe_digest fetch books
      - name: Merge and commit snapshots
        env:
          GH_TOKEN: ${{ github.token }}
          HN_OK: ${{ steps.fetch-hn.outcome == 'success' }}
          YT_OK: ${{ steps.fetch-youtube.outcome == 'success' }}
          PAPERS_OK: ${{ steps.fetch-papers.outcome == 'success' }}
          BOOKS_OK: ${{ steps.fetch-books.outcome == 'success' }}
        run: |
          day=$(date -u +%F)
          now=$(date -u +%H:%MZ)
          kinds=""
          merge() { # merge <kind> <dir>: merge today's fetch, prune to 7 days, stage
            PYTHONPATH=src python3 -m swe_digest merge "$1" ".cache/$1/$day.json" "$2/$day.json"
            ls "$2"/*.json | sort | head -n -7 | xargs -r git rm -q --
            git add "$2/$day.json"
            kinds="${kinds:+$kinds, }$1"
          }
          if [ "$HN_OK" = "true" ]; then merge hn data/hn; fi
          if [ "$YT_OK" = "true" ]; then merge yt data/youtube; fi
          if [ "$PAPERS_OK" = "true" ]; then merge papers data/papers; fi
          if [ "$BOOKS_OK" = "true" ]; then merge books data/books; fi
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          staged=$(git diff --cached --name-only)
          if printf '%s\n' "$staged" | grep -qvE '^data/(hn|youtube|papers|books)/[0-9]{4}-[0-9]{2}-[0-9]{2}\.json$'; then
            echo "refusing: staged paths outside the snapshot directories"; exit 1
          fi
          PYTHONPATH=src python3 -m swe_digest commit-snapshot "chore: ${kinds} snapshots for $day $now"
      - name: Fail on degraded fetches
        # After the merge, so a partial failure still commits what succeeded
        # but the run reports failure and failure-alert fires.
        if: >-
          steps.fetch-hn.outcome == 'failure' ||
          steps.fetch-youtube.outcome == 'failure' ||
          steps.fetch-papers.outcome == 'failure' ||
          steps.fetch-books.outcome == 'failure'
        run: |
          echo "one or more fetches failed; see the fetch steps above"
          exit 1
