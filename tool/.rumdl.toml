# rumdl owns Markdown; dprint owns TOML/JSON.
# Generated and strict-structure trees (Zola `site/content/`, `snapshots/`)
# are left untouched so the digest build and unattended agent runs are
# unaffected.
[global]
respect_gitignore = true
exclude = [
  "site/content",
  "site/data",
  "snapshots",
  "dist",
  "public",
  ".cache",
  ".run",
  ".claude-notes",
]
# MD013: do not reflow prose or enforce a hard line length.
# MD057: the README uses GitHub-relative links (../../issues/new?...) that
# resolve on GitHub but not on the local filesystem.
disable = ["MD013", "MD057"]
