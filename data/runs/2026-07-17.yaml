    promotions). Story and improvement inboxes empty. source_count 32->36.
    Weekly marker newest 2026-07-12 (5 days), no weekly trigger. No qualifying
    book or New videos item.
    Third run (~16:47 UTC, update in place). HN full structured coverage via
    Algolia (65/79 queries). Reddit live fetch timed out from the datacenter
    IP; used committed snapshot (fetched 13:58 UTC, 246 unique posts), AI
    pulse still Kimi K3/GPT-5.6, no new pulse block. Added two fresh stories:
