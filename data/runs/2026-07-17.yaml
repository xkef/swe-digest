    blog (2.8T MoE, pricing, weights due 2026-07-27), superseding the
    2026-07-16 no-model-card followup. GitHub REST API 90-min degradation in
    Outages.
    Second run (~11:10 UTC, deep sweep, update in place). Full GitHub release
    check across every [github] repo: no new stable release since the
    2026-07-16 digest (rust 1.97.1, kotlin 2.4.10, deno 2.9.3, brew 6.0.11
    already covered; neovim nightly and yjs rc are rolling prereleases);
    github.com/trending showed no new cross-source theme. CISA KEV still
    2026.07.16 (count 1647), no 2026-07-17 addition, lead security story
    current. Filled the empty Languages section with Solod (Go-subset to C11
    transpiler, HN 48895199, discussion) and added a second Engineering post
    (classical-ML LLM-text detection, HN 48936880). Re-ran Reddit: degraded,
