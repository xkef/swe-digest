  notes: |
    First run of 2026-07-16 (creates the digest). HN full structured
    coverage via Algolia (no degradation). Reddit degraded: live fetch
    returned only 5/28 top and 4/28 hot subreddits (datacenter-IP rate
    limiting), partial results kept and the degradation stated in Sources
    checked; one standout tracked-person pulse item surfaced (Linus
    Torvalds on AI in kernel development, r/linux and r/LocalLLaMA).
    Top stories: Inkling open-weights model from Thinking Machines (lead,
    48924912, verified via thinkingmachines.ai + Hugging Face Apache-2.0);
    xAI open-sourcing Grok Build (48926590, verified via github.com/xai-org
    /grok-build + Simon Willison; x.ai/news 403 from datacenter as usual,
    resolved via GitHub and secondary outlets); Oracle E-Business Suite
    CVE-2026-46817 added to CISA KEV 2026-07-15 (NVD + KEV JSON feed);
    Stripe and Advent reported $53.4B PayPal offer (TechCrunch + CNBC,
    developing, companies unconfirmed).
    Reviewed the 2026-07-15 backtest: accepted the seeded default causes,
    no watchlist_gap promotions. The early low-point Inkling item
    (48924929, 119 pts at 07-15 publish) is a timing miss now covered as
    today's lead, so it stays scrape_gap.
    GitHub releases new since 2026-07-14: Kotlin 2.4.10 (bugfix, in
    Languages and runtimes), Deno 2.9.3 (patch, entity update only),
    neovim nightly and zed v1.12.0-pre prereleases skipped. FreeBSD 16
    base-system GPL removal (dialog to bsddialog) in Developer tools.
    Papers: arXiv API timed out, RSS fallback used, no qualifying paper.
    Books cleared nothing. YouTube: 11 uploads, several channel feeds 404
    or 500, none cleared the New videos bar. Outages: Cloudflare scheduled
    maintenance plus Workers AI degradation, OpenAI FedRAMP-only issue, no
    major provider incident. No open story or improvement issues. Weekly
    marker newest 2026-07-12 (4 days), under the 7-day trigger.
    Not the 09:50 deep sweep; a targeted [github] release check ran.
    Deep-sweep update run (~11:22Z). Full [github] release check across all
    watchlist repos: nothing new-and-notable since the first run (neovim
    nightly, zed v1.12.0-pre, yjs v14.0.0-rc.24 prereleases skipped;
    automerge js/automerge-3.3.2 an empty-notes patch; prometheus 3.13.1
    and rdkit 2026_03_4 predate the day; kernel now 7.2-rc3, routine).
    github.com/trending surfaced no new cluster (Bonsai already tracked,
    github/copilot-sdk not verified as new). HN re-fetched full via Algolia;
    verified two engineering-post additions to fill the thin section:
    PlanetScale sharding explainer (48930075, planetscale.com, Vitess/Neki)
    and typesanitizer job-queues semantics post (48903733). Checked but
    skipped: "Codex Micro" (48923079, 283 pts) is OpenAI merch (Work Louder
    macropad, /supply/co-lab/), not a model; OpenAI EU trademark refusal
    (48921461, EU General Court 2026-07-15) is a naming/legal outcome with
    no engineering-context change; misa77 codec Show HN unverified single
    author. Reddit re-fetched, degraded again (4/28 top, 4/28 hot), snapshot
    accumulates, no new pulse item above the Linus thread already covered.
    source_count 27 to 31. Top-stories order unchanged (Inkling lead).
