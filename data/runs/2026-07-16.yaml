    48924912, verified via thinkingmachines.ai + Hugging Face Apache-2.0);
    xAI open-sourcing Grok Build (48926590, verified via github.com/xai-org
    /grok-build + Simon Willison; x.ai/news 403 from datacenter as usual,
    resolved via GitHub and secondary outlets); Oracle E-Business Suite
    CVE-2026-46817 added to CISA KEV 2026-07-15 (NVD + KEV JSON feed);
    Stripe and Advent reported $53.4B PayPal offer (TechCrunch + CNBC,
    developing, companies unconfirmed).
    Reviewed the 2026-07-15 backtest: accepted the seeded default causes,
    no watchlist_gap promotions. The early low-point Inkling item
    (48924929, 119 pts at 07-15 publish) is a timing miss now covered as
    today's lead, so it stays scrape_gap.
    GitHub releases new since 2026-07-14: Kotlin 2.4.10 (bugfix, in
    Languages and runtimes), Deno 2.9.3 (patch, entity update only),
    neovim nightly and zed v1.12.0-pre prereleases skipped. FreeBSD 16
    base-system GPL removal (dialog to bsddialog) in Developer tools.
    Papers: arXiv API timed out, RSS fallback used, no qualifying paper.
    Books cleared nothing. YouTube: 11 uploads, several channel feeds 404
    or 500, none cleared the New videos bar. Outages: Cloudflare scheduled
    maintenance plus Workers AI degradation, OpenAI FedRAMP-only issue, no
    major provider incident. No open story or improvement issues. Weekly
    marker newest 2026-07-12 (4 days), under the 7-day trigger.
