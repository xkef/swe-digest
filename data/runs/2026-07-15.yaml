    stay scrape_gap rather than watchlist_gap.
    GitHub releases new since yesterday: Homebrew 6.0.11 (brew vulns
    command, OSV advisory export) covered in Developer tools; automerge
    js/automerge-3.3.2 patch not surfaced. YouTube returned 3 uploads,
    none with HN discussion, none cleared the New videos bar.
    Not the 09:50 deep sweep; a targeted [github] release check ran.
    Deep sweep (09:50 slot, executed ~11:26 UTC): update run, kept the
    existing stories and added what surfaced since the first run. Full
    [github] release table swept, no new release since the first run
