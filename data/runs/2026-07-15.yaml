    3/28 top and 4/28 hot subreddits with no standout pulse item, so the
    Reddit and social pulse section was omitted and the degradation stated
    in Sources checked. No open story or improvement issues.
    Reviewed the 2026-07-14 backtest: accepted the seeded default causes,
    no watchlist_gap promotions. The notable timing misses (Cursor 0day
    48910676, Bonsai 27B 48910545, Linux input-latency 48909424) are all
    covered in today's digest and are caught by existing queries, so they
    stay scrape_gap rather than watchlist_gap.
    GitHub releases new since yesterday: Homebrew 6.0.11 (brew vulns
    command, OSV advisory export) covered in Developer tools; automerge
    js/automerge-3.3.2 patch not surfaced. YouTube returned 3 uploads,
    none with HN discussion, none cleared the New videos bar.
    Not the 09:50 deep sweep; a targeted [github] release check ran.
    Deep sweep (09:50 slot, executed ~11:26 UTC): update run, kept the
    existing stories and added what surfaced since the first run. Full
    [github] release table swept, no new release since the first run
    (Homebrew 6.0.11 and Kotlin 2.4.10 predate it; automerge 3.3.2 patch
    not surfaced). github.com/trending showed a Claude Code skill-library
    cluster (hallmark, mattpocock/skills), a discovery-layer theme with no
    verified standalone story. New this run: added The Memory Heist
    (48916975, Claude memory exfiltration via web_fetch link-following,
    Anthropic-mitigated) to Top stories as the second item behind the
    still-unpatched Cursor 0day lead, and added Armin Ronacher's "The
    Tower Keeps Rising" (48909785, tracked [social] person, own domain) to
    Reddit and social pulse as discussion. HN full structured coverage via
    Algolia. Reddit still degraded (4/28 top and 4/28 hot subreddits from
    the committed snapshot), consistent with the datacenter-IP block; no
    standout Reddit pulse item. YouTube recovered to full coverage (36
    uploads across 89 channels) but no upload cleared the New videos bar.
    Papers and books cleared nothing. No open story or improvement issues.
