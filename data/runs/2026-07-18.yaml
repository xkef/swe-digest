  notes: |
    First run of 2026-07-18 (01:30 UTC slot, executed ~04:24 UTC); created the
    digest. Quiet day: no new GitHub watchlist releases since 2026-07-17, no new
    CISA KEV entries after 2026-07-16. Lead is wp2shell, an unauthenticated RCE
    in stock WordPress core (CVE-2026-63030 + CVE-2026-60137, disclosed
    2026-07-17, fixed 6.9.5/7.0.2 with forced auto-updates, public PoC, no
    active exploitation yet). AWS Cost Explorer inflated-billing incident carried
    forward with the 2026-07-18 correction. Mozilla published its first State of
    Open Source AI report (2026-07-14). Kimi K3 (launched 2026-07-16) covered as
    an AI follow-up on its Frontend Code Arena #1 result and Simon Willison
    analysis, leading with new-signal sources rather than the Moonshot blog.
    HN full structured coverage via Algolia. Reddit degraded (5/28 top, 3/28 hot,
    HTTP 429 rate limiting); r/cursor pulse used from partial results and stated
    in Sources checked. Isomorphic Labs Drug Design Engine HN thread verified as
    a resurfaced 2026-02-10 article, not a new announcement, so omitted. OpenWrt
    "pre-auth root" reddit title verified as inaccurate (CVE-2026-59260 is
    authenticated); omitted. No open story, improvement, or feedback issues.
    Yesterday's (2026-07-17) backtest reviewed: seeded causes accepted, no
    watchlist_gap promotion.

    Deep-sweep update run (09:50 UTC slot, executed ~10:52 UTC). Ran the full
    GitHub releases check over every [github] repo plus tag-based repos
    (git/go/cpython/cargo/jdk/linux) and github.com/trending: no new release
    since 2026-07-17 (neovim nightly is the rolling prerelease; rust 1.97.1,
    Kotlin 2.4.10, chezmoi 2.71.0, jj 0.43.0 all already tracked). Trending
    clustered on the usual AI-agent/local-inference theme (MoonshotAI/kimi-cli
    ties to the already-covered Kimi K3), no new emerging-advance note.
    Status pages showed no major outage. Papers (133 unique) and books (Springer
    proceedings only) had no qualifying release. Added one Engineering post:
    "Regressive JPEGs" (maurycyz.com 2026-07-17, HN 48954851, 379 pts), a
    progressive-JPEG multi-scan animation technique. Re-ranked Top stories,
    wp2shell held the lead. Reddit still degraded (snapshot 08:05: 5/28 top,
    4/28 hot, HTTP 429); used the committed snapshot (139 posts) for pulse.
    Still no open story, improvement, or feedback issues. Weekly trigger not
    due (newest marker 2026-07-12, 6 days; Sunday 2026-07-19 scheduled run
    covers it). source_count 20 to 22.

    Update run (15:50 UTC slot, executed ~16:36 UTC). HN full structured
    coverage via Algolia. Added two discussion items surfaced since the deep
    sweep. AI: GPT-5.6 reportedly closing a derivative-free convex optimization
    lower-bound gap (r/math thread, HN 48957779, 253 pts); led with the Lean
    verification repo (PhillipKerger/zero-order-bounds-lean-verification) as the
    verifiable artifact and framed the AI authorship as a community claim (the
    manuscript does not attribute the proof to an AI), extending the AI-math
    theme (CDC proof, Star Fleet). Security: LG monitors auto-installing an
    LG application via Windows Update without consent, network-capable and
    promoting McAfee (Gamers Nexus 31/32 boots; Privacy Guides, PC Gamer, HN
    48956688); labeled discussion, no vendor advisory or CVE. Skipped as thin
    or off-bar: "What AI did to stackoverflow" data-viz (219 pts), Z80 turns 50
    (nostalgia), Fable 5 vs GPT-5.6 /goal NP-hard eval (folds into the AI-math
    theme). No qualifying video, paper, or book. Reddit still degraded (live
    4/28 top and hot, HTTP 429; committed snapshot 13:43 covers 10 subreddits);
    kept the existing r/cursor pulse. No open story, improvement, or feedback
    issues. Weekly trigger still not due. source_count 22 to 28.
