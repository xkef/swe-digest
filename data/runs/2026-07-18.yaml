  notes: |
    First run of 2026-07-18 (01:30 UTC slot, executed ~04:24 UTC); created the
    digest. Quiet day: no new GitHub watchlist releases since 2026-07-17, no new
    CISA KEV entries after 2026-07-16. Lead is wp2shell, an unauthenticated RCE
    in stock WordPress core (CVE-2026-63030 + CVE-2026-60137, disclosed
    2026-07-17, fixed 6.9.5/7.0.2 with forced auto-updates, public PoC, no
    active exploitation yet). AWS Cost Explorer inflated-billing incident carried
    forward with the 2026-07-18 correction. Mozilla published its first State of
    Open Source AI report (2026-07-14). Kimi K3 (launched 2026-07-16) covered as
    an AI follow-up on its Frontend Code Arena #1 result and Simon Willison
    analysis, leading with new-signal sources rather than the Moonshot blog.
    HN full structured coverage via Algolia. Reddit degraded (5/28 top, 3/28 hot,
    HTTP 429 rate limiting); r/cursor pulse used from partial results and stated
    in Sources checked. Isomorphic Labs Drug Design Engine HN thread verified as
    a resurfaced 2026-02-10 article, not a new announcement, so omitted. OpenWrt
    "pre-auth root" reddit title verified as inaccurate (CVE-2026-59260 is
    authenticated); omitted. No open story, improvement, or feedback issues.
    Yesterday's (2026-07-17) backtest reviewed: seeded causes accepted, no
