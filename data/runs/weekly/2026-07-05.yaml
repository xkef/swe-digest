  `/digests/2026-07-04/r-programming-surfaces-the-day-s-engineering-write-ups/`
  downloads an RSS file. Verified against the digests: both the 2026-07-03 and
  2026-07-04 "r/programming" stories link
  `https://www.reddit.com/r/programming/top/.rss?t=day` as the reader-facing
  `**Sources:**` link, which a browser renders/downloads as raw XML.
  docs/routine.md (Reddit collection) lists the `.rss` URLs only as collection
  endpoints and states no rule for the published source URL, so raw feed URLs
  leak in as sources. Proposed diff adds a one-paragraph rule to docs/routine.md
  (link a post permalink or the human-readable subreddit URL, never a `/.rss`
  feed URL); it touches only docs/routine.md, inside the improvement whitelist.
