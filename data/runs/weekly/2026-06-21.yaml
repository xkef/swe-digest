  One proposal opened (format axis): "Forbid duplicate story blocks within a
  digest." Evidence is two owner feedback issues on consecutive days reporting
  the same concrete defect: #15 (2026-06-19, GitHub Trojan-archives story, "I
  would consider this a duplicate. Make sure to never produce duplicates that
  reference topstories 1-1 and have no other value") and #16 (2026-06-20, Dan
  Abramov ATProto post, "This story is duplicated three times. We need to put a
  framework in place to make sure there are no dupes, especially on the same
  day"). Confirmed in the published digests: content/digests/2026-06-20 carries
  the Abramov story as three separate ### blocks (Top stories, Engineering posts
  with summary "Covered in Top stories", Reddit and social pulse), and
  content/digests/2026-06-19 carries the Trojan-archives story as a Top stories
  block plus a Security stub whose summary is "See the Top stories item". The
  proposed diff touches only CLAUDE.md: a deduplication rule under Daily output
  (one canonical ### block per story; cross-references allowed only when they
  carry new signal such as an HN comment thread or tracked-person primary post,
  never a bare "Covered in Top stories" restatement; no same-date re-add of an
  existing title or primary source) plus a matching Quality gate bullet. The
  durable mechanical guard belongs in scripts/check_content.py, which is outside
  the four-file improvement-PR allowlist; the issue notes that the owner can add
  that check separately. Diff generated by a real edit captured with git diff
  then reverted, so it applies cleanly.

