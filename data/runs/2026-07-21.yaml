    items. Day dominated by the Chinese open-weights theme (China strategy
    1022 pts, Who's afraid of Chinese models 426, Kimi Work 455 resurfaced,
    Kimi K3/Qwen 3.8 analysis 318) plus r/LocalLLaMA sentiment; led with a
    synthesized discussion story. Deduplicated Romania land registry
    (48978605), wp2shell WordPress RCE (48975665), and OpenCode (48978112)
    against the 2026-07-20 digest, which already covered them with the same
    primary URLs; not re-added. Kimi Work confirmed as a June 2026 product
    (K2.6), resurfaced not new, so not led as fresh. Hyprland 0.55 dropped as
    a resurfaced May 2026 release. Zig->Codeberg is from Nov 2025 (not new);
    only the accepted Fil-C-inspired `fil` ABI proposal (issue 36237, Andrew
    Kelley, 2026-07-20) is fresh. Firefox 153 ESR designation left out
    (Phoronix and mozilla.org disagreed); reported only verified features.
    Update run (~11:35 UTC), deep sweep. HN full structured coverage via
    Algolia again. Ran the full GitHub releases check across every [github]
    repo plus github.com/trending: only minor patch releases since the first
    run (Grafana 13.1.1 10:58 UTC, Homebrew 6.0.12, chezmoi 2.71.1), none
    clearing the story bar; entities refreshed for Homebrew and chezmoi.
    Trending clustered on AI agents and local-first inference, consistent with
    the already-led theme, no new emerging-advance block. Added one new story:
    Jellyfin amicable leadership handoff (forum announcement, HN 48986091, 261
    pts), Developer tools, on the tracked maintainer-burden theme; verified
    against the forum post. Kimi Work (now 579 pts) still a resurfaced June
    2026 K2.6 product, not re-added. CISA KEV still 2026.07.16 (1647), zero
    additions since 2026-07-17; no new outages, so Security/Outages stay no
