  notes: |
    First run of 2026-07-20 (executed ~05:05 UTC), created the digest. Quiet
    weekend-tail Monday. HN full coverage via Algolia (all backends 200,
    non-degraded). Reddit degraded: rate-limited to 5/28 top-listing and 3/28
    hot-listing subreddits (429s), supplemented by the committed snapshot
    (7 subreddits); pulse was low-signal (JVM/Valhalla, open-weight coding
    triangulation), no verified primary-source Reddit story.
    stars fetch returned 0 events (quiet day), no notable-stars block.
    papers 113 items, no high-attention engineering paper. yt 20 videos,
    none with HN discussion signal, New videos omitted. books only Springer
    conference proceedings, section omitted. events: none active (EuroPython
    closed 2026-07-19).
    Lead: Levent Alpoge's machine-checkable counterexample to the Jacobian
    Conjecture credited to Claude (developing; HN verified symbolically,
    Wikipedia updated); strongest AI-math-theme datapoint yet because it is
    verifiable, unlike the earlier prose proof claims. Other top stories:
    Moonshot pausing Kimi K3 subscriptions on demand (confirmed), Ollama $88M
    raise (confirmed). No fresh security KEV additions (catalog 2026.07.16
    unchanged at 1647), Security and Outages both anchor-empty.
    Story inbox and improvement issues both empty (no open issues).
    Backtest of 2026-07-19 reviewed: seeded causes accepted, no genuine
    watchlist_gap promotions (notable engineering items were covered earlier
    or carried into 2026-07-20). Unattended run: committed locally, no push,
    no write APIs; no manifest side effects needed this run.
    Midday update run (~12:06 UTC): HN full via Algolia again. Added four
    stories that surfaced after the first run: Qwen 3.8 2.4T preview going
    open-weight (AI, discussion, HN 48966120 897 pts, vendor claims); wp2shell
    WordPress core pre-auth RCE found by Searchlight Cyber with GPT-5.6 for
    ~$25 (Security, confirmed, HN 48975665, fills the previously empty Security
    anchor, CVE-2026-63030/60137 already patched 6.9.5/7.0.2); Minecraft Java
    GLFW-to-SDL3 switch (Dev tools, confirmed, HN 48967256); Bun Rust rewrite
    shipping in Claude Code v2.1.181+ verified by Simon Willison (Languages,
    confirmed, HN 48966569). source_count 18 -> 27. Top stories left at 3
    (kept the Jacobian counterexample lead; new items ranked to topical
    sections). Reddit degraded again (429s). No new inbox or improvement
    issues.
    Afternoon update run (~17:07 UTC, the 15:50 scheduled run): HN full via
    Algolia again (non-degraded). Added two stories that surfaced after the
    midday run: Romania ANCPI national land-registry wipe (Security, confirmed,
    HN 48978605 336 pts; credential-based intrusion wiped systems and backups
    after failed extortion, ~1-week real-estate-market outage, offline backup
    aided recovery, ByteToBreach/KELA attribution) promoted to Top stories
    (now 4, Jacobian kept as lead) and filling out the Security coverage;
    OpenCode permission-bypass write-up (Agentic coding, discussion, HN
    48978112 307 pts, wren.wtf) added in a new Agentic coding section. Romania
    corroborated via Risky Business + Help Net Security (added news.risky.biz
    to source-reliability). Added Romania follow-up to memory. source_count
    27 -> 32. High-velocity GitHub repos re-checked (rust/go/deno/bun/neovim/
    ghostty/cpython/node): no new stable release after the deep sweep. Reddit
    degraded (4/28 subreddits, partial live plus 14:29 UTC snapshot); pulse
    unchanged. events none active, stars 0 events, papers/books/yt no
    qualifying new item. Story inbox and improvement issues still empty.
    Unattended run: committed locally, no push, no write APIs; no manifest
    side effects needed.
