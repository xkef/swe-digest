  ["meta", "llama", "pytorch"],
  ["microsoft", "azure", "vscode"],
  ["github", "copilot"],
  ["xai", "grok"],
  ["kubernetes", "k8s"],
  ["postgresql", "postgres"],
  ["javascript", "typescript", "node", "deno", "bun"],
  ["apple", "swift", "xcode", "macos", "ios"],
]
