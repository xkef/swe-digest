[papers]
# arXiv categories and free-text queries pulled by scripts/fetch_papers.py via
# the arXiv API and per-category RSS. Feeds the ML research section. Keep the
# category set tight; include a paper only when it has clear engineering
# relevance, never because it trends.
categories = [
  "cs.LG",
  "cs.CL",
  "cs.AI",
  "cs.CR",
  "cs.SE",
  "cs.DC",
  "cs.PL",
]
queries = [
  "language model agents",
  "retrieval augmented generation",
  "inference optimization",
  "quantization",
]

[books]
# Publisher and imprint RSS feeds pulled by scripts/fetch_books.py for new
# technical-book releases. Format: "Label|https://feed-url". Coverage is thin
# industry-wide, so this is best-effort and supplemented by Hacker News. Verify
# a feed resolves before adding it; the fetcher warns and continues past a dead
# feed but cannot recover missing coverage.
feeds = [
  "No Starch Press|https://nostarch.com/rss.xml",
  "Pragmatic Bookshelf|https://pragprog.com/rss.xml",
]
