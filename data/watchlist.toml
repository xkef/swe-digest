[[events]]
# Curated tech conferences, keynotes, livestreams, and scheduled release
# events. scripts/fetch_events.py filters this list by date to surface
# upcoming events (lead time) and ones active today; it does no network call,
# so the dates here are the source of truth. Keep them current and verified
# against each event's official page. Schema per entry: name, start, end
# (ISO dates; end may equal start for a one-day event), url, topic (one of the
# digest section labels). Remove an event once it is well past.
name = "KubeCon + CloudNativeCon North America 2026"
start = "2026-11-10"
end = "2026-11-13"
url = "https://events.linuxfoundation.org/kubecon-cloudnativecon-north-america/"
topic = "Infrastructure"

