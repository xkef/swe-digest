base_url = "https://xkef.github.io/swe-digest"
title = "SWE Digest"
description = "Daily software engineering digest with links, context, and follow-up memory."
compile_sass = false
build_search_index = true
generate_feeds = true
feed_filenames = ["feed.xml"]
minify_html = false
taxonomies = [
  { name = "categories", feed = true },
  { name = "tags", feed = true },
]

[markdown]
smart_punctuation = false
insert_anchor_links = "none"

[search]
include_title = true
include_description = true
# Story pages carry their summary as `description`, so title + description keeps
# search useful while bounding the client-side index as the archive grows.
include_content = false
index_format = "fuse_json"

[extra]
author = "xkef"
repository = "https://github.com/xkef/swe-digest"
