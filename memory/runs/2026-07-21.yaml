    items. Day dominated by the Chinese open-weights theme (China strategy
    1022 pts, Who's afraid of Chinese models 426, Kimi Work 455 resurfaced,
    Kimi K3/Qwen 3.8 analysis 318) plus r/LocalLLaMA sentiment; led with a
    synthesized discussion story. Deduplicated Romania land registry
    (48978605), wp2shell WordPress RCE (48975665), and OpenCode (48978112)
    against the 2026-07-20 digest, which already covered them with the same
    primary URLs; not re-added. Kimi Work confirmed as a June 2026 product
