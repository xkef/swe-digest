    01:30 run left no digest). Full ~24h window; most large items broke late
    2026-07-21, so several strong HN threads were already covered in the
    2026-07-21 digest (Gemini 3.6 Flash, Qwen-Image-3.0, Poolside Laguna S 2.1,
    Block/Buzz, the AI-debt report) and were not re-added.
    HN: full structured coverage via Algolia (GitHub Actions egress, not the
    blocked datacenter range); no degradation.
