    and re-dated in access-notes.
    Stars: quiet day, 0 events; no Notable-stars block.
    Books/events/New videos: nothing cleared the bar; sections omitted. 0 YouTube
    videos carried HN discussion.
    Backtest: 2026-07-21 miss_review was already seeded (defaults reviewed); the
    scrape_gap-heavy distribution reflects the datacenter HN-fetch limitation and
    covered stories resurfacing. No candidate promoted to watchlist_gap.
    Access blocks hit this run: ads.openai.com (403), apnews.com (unable to
    fetch); worked around with own-domain link + WebSearch and corroborating
    outlets. FT Oracle/Wisconsin item dropped because the only available FT URL
    from search was truncated/unresolvable (link hygiene).
    Update run ~11:35 UTC (deep sweep after the 04:45 create). Re-ran all
    fetchers; full GitHub releases + trending checked, nothing new past patch
    releases (grafana 13.1.1, otel-collector 0.157.0, chezmoi 2.71.1, all minor
