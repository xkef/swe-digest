{% extends "base.html" %}

{% block content %}
<article class="layout prose story-page">
  <header class="page-header">
    <p class="eyebrow">{{ page.extra.section }}</p>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      <a href="{{ config.base_url | safe }}/digests/{{ page.extra.day }}/">{{ page.extra.day }} digest</a>
      {% if page.extra.status %}<span>{{ page.extra.status }}</span>{% endif %}
    </p>
  </header>
  <div class="story-fields">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
