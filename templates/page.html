{% extends "base.html" %}

{% block content %}
<article class="layout prose">
  <header class="page-header">
    <p class="eyebrow">Reference</p>
    <h1>{{ section.title }}</h1>
    {% if section.description %}<p>{{ section.description }}</p>{% endif %}
  </header>
  {{ section.content | safe }}
</article>
{% endblock content %}
