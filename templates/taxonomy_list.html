{% extends "base.html" %}

{% block content %}
<section class="layout listing">
  <header class="page-header">
    <p class="eyebrow">Taxonomy</p>
    <h1>{{ taxonomy.name | capitalize }}</h1>
  </header>
  <ol class="digest-list compact">
    {% for term in terms %}
    <li>
      <div>
        <h2><a href="{{ term.permalink | safe }}">{{ term.name }}</a></h2>
        <p>{{ term.pages | length }} entries</p>
      </div>
    </li>
    {% endfor %}
  </ol>
</section>
{% endblock content %}
